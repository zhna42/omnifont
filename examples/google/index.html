<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>omnifont — Google Fonts</title>
    <style>
      :root {
        --bg: #0f1115; --panel: #181b22; --border: #2a2f3a;
        --text: #e6e9ef; --muted: #8b93a3; --accent: #4f8cff;
        --accent-dim: #3a6fd8;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg); color: var(--text);
        height: 100dvh; overflow: hidden;
      }

      /* ── Header ── */
      .header {
        display: flex; gap: 12px; align-items: center;
        padding: 12px 20px; border-bottom: 1px solid var(--border);
        background: var(--panel); flex-shrink: 0;
      }
      .header input { flex: 1; min-width: 0; }
      .header .status { font-size: 13px; color: var(--muted); white-space: nowrap; }

      input[type="text"] {
        background: var(--bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 9px 12px; font-size: 14px; outline: none;
      }
      input[type="text"]:focus { border-color: var(--accent); }

      button {
        cursor: pointer; border: 1px solid var(--border);
        background: var(--panel); color: var(--text);
        padding: 9px 16px; border-radius: 8px; font-size: 14px;
        white-space: nowrap; user-select: none;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.primary:disabled { background: var(--accent-dim); border-color: var(--accent-dim); opacity: 0.6; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      /* ── Layout ── */
      .main {
        display: grid; grid-template-columns: 300px 1fr 240px;
        height: calc(100dvh - 61px); overflow: hidden;
      }

      /* ── Left Panel ── */
      .left {
        display: flex; flex-direction: column;
        border-right: 1px solid var(--border); overflow: hidden;
      }
      .left .search-bar { padding: 12px; border-bottom: 1px solid var(--border); }
      .left .search-bar input { width: 100%; }
      .font-list { flex: 1; overflow-y: auto; padding: 6px 0; }
      .font-item {
        padding: 8px 16px; cursor: pointer; font-size: 18px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        transition: background 0.1s;
      }
      .font-item:hover { background: rgba(255,255,255,0.05); }
      .font-item.selected { background: var(--accent); color: #fff; }

      /* ── Center Panel ── */
      .center {
        display: flex; flex-direction: column; padding: 24px 32px;
        overflow-y: auto;
      }
      .center .info-row {
        display: flex; gap: 12px; align-items: center; margin-bottom: 20px;
        font-size: 14px; color: var(--muted);
      }
      .center .info-row .family-name { color: var(--text); font-size: 18px; font-weight: 600; }
      .preview-wrap { position: relative; }
      .preview-box {
        padding: 28px; border: 1px solid var(--border); border-radius: 12px;
        background: var(--panel); font-size: 22px; line-height: 1.7;
        transition: font-family 0.1s; min-height: 220px;
        width: 100%; color: var(--text); resize: vertical; outline: none;
        font-family: inherit;
      }
      .preview-box:focus { border-color: var(--accent); }
      /* Прелоадер поверх превью во время загрузки шрифта */
      .preloader {
        position: absolute; inset: 0; display: none;
        align-items: center; justify-content: center; gap: 12px;
        background: rgba(24, 27, 34, 0.6); border-radius: 12px;
        color: var(--muted); font-size: 14px; backdrop-filter: blur(1px);
      }
      .preloader.active { display: flex; }
      .spinner {
        width: 22px; height: 22px; border-radius: 50%;
        border: 3px solid var(--border); border-top-color: var(--accent);
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Right Panel ── */
      .right {
        display: flex; flex-direction: column;
        border-left: 1px solid var(--border); padding: 16px; gap: 16px;
        overflow-y: auto;
      }
      .right-panel { display: flex; flex-direction: column; gap: 20px; flex: 1; }
      .right-panel > * + * { margin-top: 4px; }
      .right-placeholder {
        flex: 1; display: flex; align-items: center; justify-content: center;
        text-align: center; color: var(--muted); font-size: 16px;
        border: 1px dashed var(--border); border-radius: 12px; padding: 24px;
      }
      .right h3 { font-size: 15px; font-weight: 600; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
      .field select {
        background: var(--bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 8px 10px; font-size: 14px; outline: none;
      }
      .field select:focus { border-color: var(--accent); }
      .field select:disabled { opacity: 0.4; }
      .checkbox-row {
        display: flex; align-items: center; gap: 8px;
        font-size: 14px; color: var(--text); text-transform: none;
        letter-spacing: 0; cursor: pointer;
      }
      .checkbox-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
      .checkbox-row + .checkbox-row { margin-top: 8px; }
      .field input[type="range"] { width: 100%; accent-color: var(--accent); }
      .compact-status { font-size: 12px; color: var(--muted); min-height: 16px; }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <input type="text" id="api-key" placeholder="Google Fonts API key" />
      <button id="load-btn" class="primary">Загрузить</button>
      <span class="status" id="load-status"></span>
    </div>

    <!-- Main grid -->
    <div class="main">
      <!-- Left: search + font list -->
      <div class="left">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Поиск шрифтов..." disabled />
        </div>
        <div class="font-list" id="font-list"></div>
      </div>

      <!-- Center: preview -->
      <div class="center" id="center">
        <div class="info-row">
          <span>Выбран:</span>
          <span class="family-name" id="selected-name">—</span>
          <span id="selected-category"></span>
        </div>
        <div class="preview-wrap">
          <textarea class="preview-box" id="preview">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
Съешь же ещё этих мягких французских булок да выпей чаю.
1234567890
.,:;!?—«»“”‘’()[]{}@#№$%&*/\+=&lt;&gt;|~^</textarea>
          <div class="preloader" id="preloader">
            <span class="spinner"></span>
            <span>Загрузка шрифта…</span>
          </div>
        </div>
      </div>

      <!-- Right: settings -->
      <div class="right">
        <div class="right-placeholder" id="right-placeholder">
          <p>Выберите шрифт!</p>
        </div>

        <div class="right-panel" id="right-panel" style="display:none;">
          <h3>Настройки начертания</h3>

          <div class="field">
            <label for="weight-select">Толщина (weight)</label>
            <select id="weight-select" disabled></select>
          </div>

          <div class="field">
            <label>Наклон (style)</label>
            <label class="checkbox-row">
              <input type="checkbox" id="italic-check" disabled />
              <span>Курсив (italic)</span>
            </label>
          </div>

          <div class="field">
            <label for="size-range">Размер: <span id="size-value">22</span>px</label>
            <input type="range" id="size-range" min="12" max="72" value="22" />
          </div>

          <div class="field">
            <label for="spacing-range">Трекинг: <span id="spacing-value">0</span>px</label>
            <input type="range" id="spacing-range" min="-4" max="12" step="0.5" value="0" />
          </div>

          <div class="field">
            <label class="checkbox-row">
              <input type="checkbox" id="underline-check" />
              <span>Подчёркивание</span>
            </label>
            <label class="checkbox-row">
              <input type="checkbox" id="uppercase-check" />
              <span>ВЕРХНИЙ РЕГИСТР</span>
            </label>
          </div>

          <div class="compact-status" id="right-status"></div>
          <button class="primary" id="apply-btn" disabled style="margin-top:auto;">Применить шрифт</button>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
